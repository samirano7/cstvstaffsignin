<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Create Account</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="text-center">
            <h1>Create Account</h1>
            <p class="subtitle">Register to access the daily check-in portal.</p>
        </div>
        <form action="index.html">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="E.g. Samirano" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="staff@company.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Register Account</button>
            <a href="index.html" class="link">Already have an account? Sign In</a>
        </form>
    </div>
</body>
</html>
