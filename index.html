<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Sign In</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="text-center">
            <h1>Staff Sign In</h1>
            <p class="subtitle">Welcome back. Please sign in to complete your daily check-in.</p>
        </div>
        <form action="checkin.html">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="staff@company.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
            <a href="signup.html" class="link">Don't have an account? Create one</a>
        </form>
    </div>
</body>
</html>
