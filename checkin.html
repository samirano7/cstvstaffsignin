<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - Daily Check-in</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="checkin-header">
            <div>
                <h2>Welcome, Staff Member!</h2>
                <span class="date-display" id="current-date">Loading date...</span>
            </div>
            <span class="status-badge status-pending" id="status-badge">Pending Check-in</span>
        </div>
        
        <div class="camera-container" id="camera-container">
            <span class="camera-icon" id="camera-icon">📸</span>
            <img id="selfie-preview" alt="Selfie preview" />
        </div>
        
        <div class="location-badge" id="location-badge">
            📍 Acquiring Location...
        </div>
        
        <p class="subtitle text-center" id="instruction-text">Please capture your selfie to check in.</p>
        
        <button class="btn" id="capture-btn" onclick="mockCheckIn()">Capture Selfie & Check In</button>
    </div>

    <script>
        // Set today's date
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);

        // Mock getting location
        setTimeout(() => {
            document.getElementById('location-badge').innerHTML = '📍 HQ Office (Accuracy: 5m)';
        }, 1500);

        // Mock capturing selfie and checking in
        function mockCheckIn() {
            const btn = document.getElementById('capture-btn');
            const badge = document.getElementById('status-badge');
            const icon = document.getElementById('camera-icon');
            const preview = document.getElementById('selfie-preview');
            const instruction = document.getElementById('instruction-text');

            btn.textContent = 'Processing...';
            btn.disabled = true;

            setTimeout(() => {
                // Change status badge
                badge.className = 'status-badge status-success';
                badge.textContent = 'Checked In';

                // Show mock image placeholder
                icon.style.display = 'none';
                preview.src = 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=400&q=80';
                preview.style.display = 'block';

                // Update text and button
                instruction.textContent = 'You have successfully checked in for today.';
                btn.textContent = 'Check-in Complete';
                btn.style.background = 'var(--badge-success-text)';
            }, 1000);
        }
    </script>
</body>
</html>
